name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Dependências reproduzíveis
        run: npm ci
      - name: Auditoria de produção
        run: npm audit --omit=dev --audit-level=high
      - name: Testes unitários
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Dependências reproduzíveis
        run: npm ci
      - name: Chromium do Playwright
        run: npx playwright install --with-deps chromium
      - name: Testes ponta a ponta
        run: npm run test:e2e
